{% extends "base.html" %}

{% block title %}Edit {{ product.name }} - PriceSpy{% endblock %}

{% block content %}
<a href="/product/{{ product.id }}" class="back-link">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
    Back to Product
</a>

<div class="card form-card" style="max-width: 100%;">
    <div class="card-header">
        <h2 class="card-title">Edit Product</h2>
    </div>
    <div class="card-body">
        <form method="post" action="/product/{{ product.id }}/edit" id="productForm">
            <!-- Product Info -->
            <div class="form-section">
                <div class="form-section-title">Product Information</div>
                <div class="form-group">
                    <label for="name" class="form-label">Product Name</label>
                    <input type="text" id="name" name="name" class="form-input" required
                           value="{{ product.name }}">
                </div>

                <div class="form-group">
                    <label for="search_query" class="form-label">Search Query</label>
                    <input type="text" id="search_query" name="search_query" class="form-input" required
                           value="{{ product.search_query }}">
                    <div class="form-hint">Keywords for Google Shopping search</div>
                </div>
            </div>

            <!-- Category Selection -->
            <div class="form-section">
                <div class="form-section-title">Category</div>
                <div class="form-group">
                    <select id="category" name="category" class="form-select" required>
                        <option value="electronics" {{ 'selected' if product.category == 'electronics' else '' }}>Electronics</option>
                        <option value="clothes" {{ 'selected' if product.category == 'clothes' else '' }}>Clothes</option>
                    </select>
                </div>
            </div>

            <!-- Details -->
            <div class="form-section">
                <div class="form-section-title">Details</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="brand" class="form-label">Brand <span class="optional">(optional)</span></label>
                        <input type="text" id="brand" name="brand" class="form-input"
                               value="{{ product.brand or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="model" class="form-label">Model <span class="optional">(optional)</span></label>
                        <input type="text" id="model" name="model" class="form-input"
                               value="{{ product.model or '' }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="size" class="form-label">Size <span class="optional">(optional)</span></label>
                        <input type="text" id="size" name="size" class="form-input"
                               value="{{ product.size or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="color" class="form-label">Color <span class="optional">(optional)</span></label>
                        <input type="text" id="color" name="color" class="form-input"
                               value="{{ product.color or '' }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="storage" class="form-label">Storage <span class="optional">(optional)</span></label>
                        <input type="text" id="storage" name="storage" class="form-input"
                               value="{{ product.storage or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="material" class="form-label">Material <span class="optional">(optional)</span></label>
                        <input type="text" id="material" name="material" class="form-input"
                               value="{{ product.material or '' }}">
                    </div>
                </div>
            </div>

            <!-- Region & Price -->
            <div class="form-section">
                <div class="form-section-title">Search & Alert</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="region" class="form-label">Search Region</label>
                        <select id="region" name="region" class="form-select" required>
                            <option value="eu" {{ 'selected' if product.region == 'eu' else '' }}>European Union (no customs)</option>
                            <option value="worldwide" {{ 'selected' if product.region == 'worldwide' else '' }}>Worldwide</option>
                            <option value="hu" {{ 'selected' if product.region == 'hu' else '' }}>Hungary Only</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="target_price" class="form-label">Target Price</label>
                        <div class="price-input-group">
                            <input type="number" id="target_price" name="target_price" class="form-input" required
                                   step="0.01" min="0" value="{{ product.target_price }}">
                            <select id="currency" name="currency" class="form-select">
                                <option value="EUR" {{ 'selected' if product.currency == 'EUR' else '' }}>EUR</option>
                                <option value="USD" {{ 'selected' if product.currency == 'USD' else '' }}>USD</option>
                                <option value="HUF" {{ 'selected' if product.currency == 'HUF' else '' }}>HUF</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="user_email" class="form-label">Email for Alerts</label>
                    <input type="email" id="user_email" name="user_email" class="form-input" required
                           value="{{ product.user_email }}">
                </div>
            </div>

            <div style="display: flex; gap: 12px; padding-top: 24px; border-top: 1px solid var(--border-light);">
                <button type="submit" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    Save Changes
                </button>
                <a href="/product/{{ product.id }}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
