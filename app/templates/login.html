{% extends "base.html" %}
{% block title %}Login — PriceSpy{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 80px auto;">
    <div class="card">
        <div class="card-header">
            <span class="card-title">Sign in</span>
        </div>
        <div class="card-body">
            {% if error %}
            <div style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 24px; color: var(--destructive); font-size: 1rem;">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
